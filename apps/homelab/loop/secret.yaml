---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: &name loop-secret
  namespace: homelab
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: *name
    creationPolicy: Owner
    template:
      data:
        # Full connection string built from the stored password
        DATABASE_URL: "postgresql://loop:{{ .POSTGRES_PASSWORD }}@postgresql-rw.database.svc.cluster.local:5432/loop"
        AUTH_SECRET: "{{ .AUTH_SECRET }}"
        ADMIN_EMAILS: "{{ .ADMIN_EMAILS }}"
  dataFrom:
    - extract:
        key: loop
