# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2beta2.schema.json
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app loop
  namespace: homelab
spec:
  interval: 15m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: default
  maxHistory: 3
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    controllers:
      loop:
        initContainers:
          migrate:
            image:
              repository: ghcr.io/jonschaeffer/loop-migrate
              tag: latest
            env:
              DATABASE_URL:
                valueFrom:
                  secretKeyRef:
                    name: loop-secret
                    key: DATABASE_URL
        containers:
          app:
            image:
              repository: ghcr.io/jonschaeffer/loop
              tag: latest
              pullPolicy: Always
            env:
              AUTH_URL: "https://loop.porgy-monitor.ts.net"
              DATABASE_URL:
                valueFrom:
                  secretKeyRef:
                    name: loop-secret
                    key: DATABASE_URL
              AUTH_SECRET:
                valueFrom:
                  secretKeyRef:
                    name: loop-secret
                    key: AUTH_SECRET
              ADMIN_EMAILS:
                valueFrom:
                  secretKeyRef:
                    name: loop-secret
                    key: ADMIN_EMAILS
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: 3000
                  initialDelaySeconds: 10
                  periodSeconds: 30
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: 3000
                  initialDelaySeconds: 5
                  periodSeconds: 10

    service:
      app:
        controller: *app
        ports:
          http:
            port: &port 3000

    ingress:
      app:
        enabled: true
        className: tailscale
        annotations:
          tailscale.com/funnel: "true"
        defaultBackend:
          service:
            name: *app
            port:
              number: *port
        tls:
          - hosts:
              - *app
