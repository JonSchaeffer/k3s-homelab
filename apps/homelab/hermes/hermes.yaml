---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app hermes
  namespace: homelab
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: default
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    controllers:
      hermes:
        containers:
          app:
            image:
              repository: nousresearch/hermes-agent
              tag: latest@sha256:a5ec90f04a49ef127758b669e0abef43eb91ca677a9ad39d66dba2071301e8d7
            args:
              - gateway
              - run
            env:
              HERMES_HOME: /opt/data
              HOME: /opt/data
              API_SERVER_ENABLED: "true"
              API_SERVER_HOST: 0.0.0.0
              API_SERVER_KEY: 23b193e867199c5a463c62d034101e68
              HERMES_DASHBOARD: "1"
              HERMES_DASHBOARD_HOST: 0.0.0.0
              HERMES_DASHBOARD_BASIC_AUTH_USERNAME: jon
              HERMES_DASHBOARD_BASIC_AUTH_PASSWORD: WH9liFYR8ywKkmm3
              HERMES_UID: "1000"
              HERMES_GID: "1000"
              # Fill these in with your API keys after deployment
              # See apps/homelab/hermes/secret.yaml
            envFrom:
              - secretRef:
                  name: hermes-secret
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: &port 8642
                  initialDelaySeconds: 60
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 5
              readiness: *probes
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                memory: 2Gi
    defaultPodOptions:
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        controller: *app
        ports:
          http:
            port: 8642
          dashboard:
            port: 9119
    ingress:
      api:
        enabled: true
        className: tailscale
        hosts:
          - host: hermes-api
            paths:
              - path: /
                service:
                  name: *app
                  port: 8642
        tls:
          - hosts:
            - hermes-api
      dashboard:
        enabled: true
        className: tailscale
        hosts:
          - host: *app
            paths:
              - path: /
                service:
                  name: *app
                  port: 9119
        tls:
          - hosts:
            - *app
    persistence:
      data:
        existingClaim: hermes-data
        advancedMounts:
          hermes:
            app:
              - path: /opt/data
