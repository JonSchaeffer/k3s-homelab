---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app hermes
  namespace: homelab
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: default
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    controllers:
      hermes:
        containers:
          app:
            image:
              repository: nousresearch/hermes-agent
              tag: latest@sha256:17e5c3db7d47af9d76ac2f5331d3b5d310535830f372d0a5b73c3924294e1017
            command:
              - hermes
            args:
              - gateway
              - run
            env:
              HERMES_HOME: /opt/data
              HOME: /opt/data
              API_SERVER_ENABLED: "true"
              API_SERVER_HOST: 0.0.0.0
              API_SERVER_KEY: 23b193e867199c5a463c62d034101e68
              # Fill these in with your API keys after deployment
              # See apps/homelab/hermes/secret.yaml
            envFrom:
              - secretRef:
                  name: hermes-secret
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: &port 8642
                  initialDelaySeconds: 60
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 5
              readiness: *probes
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                memory: 2Gi
    defaultPodOptions:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        runAsNonRoot: true
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        controller: *app
        ports:
          http:
            port: *port
    ingress:
      app:
        enabled: true
        className: tailscale
        defaultBackend:
          service:
            name: *app
            port:
              number: *port
        tls:
          - hosts:
            - hermes-api
    persistence:
      data:
        existingClaim: hermes-data
        advancedMounts:
          hermes:
            app:
              - path: /opt/data
