---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app tinacms
  namespace: homelab
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: default
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    controllers:
      tinacms:
        initContainers:
          git-clone:
            image:
              repository: alpine/git
              tag: latest
            command:
              - sh
              - -c
              - |
                git clone https://${GITHUB_TOKEN}@github.com/${GITHUB_OWNER}/${GITHUB_REPO}.git /tmp/repo
                cp -a /tmp/repo/content/en/* /data/content/en/
                cp -a /tmp/repo/.git /data/git-repo/
                cp -a /tmp/repo/content /data/git-repo/
            env:
              GITHUB_TOKEN:
                valueFrom:
                  secretKeyRef:
                    name: tinacms-secret
                    key: GITHUB_PERSONAL_ACCESS_TOKEN
              GITHUB_OWNER:
                valueFrom:
                  secretKeyRef:
                    name: tinacms-secret
                    key: GITHUB_OWNER
              GITHUB_REPO:
                valueFrom:
                  secretKeyRef:
                    name: tinacms-secret
                    key: GITHUB_REPO
        containers:
          app:
            image:
              repository: ghcr.io/jonschaeffer/tinacms-backend
              tag: latest
            resources:
              requests:
                cpu: 10m
              limits:
                memory: 512Mi
          git-sync:
            image:
              repository: alpine/git
              tag: latest
            command:
              - sh
              - -c
              - |
                cd /data/git-repo
                git config user.email "tinacms@jonschaeffer.dev"
                git config user.name "TinaCMS"
                while true; do
                  sleep 60
                  cp -a /data/content/en/* content/en/
                  if [ -n "$(git status --porcelain)" ]; then
                    git add -A
                    git commit -m "Content update via TinaCMS"
                    git push https://${GITHUB_TOKEN}@github.com/${GITHUB_OWNER}/${GITHUB_REPO}.git main
                  fi
                done
            env:
              GITHUB_TOKEN:
                valueFrom:
                  secretKeyRef:
                    name: tinacms-secret
                    key: GITHUB_PERSONAL_ACCESS_TOKEN
              GITHUB_OWNER:
                valueFrom:
                  secretKeyRef:
                    name: tinacms-secret
                    key: GITHUB_OWNER
              GITHUB_REPO:
                valueFrom:
                  secretKeyRef:
                    name: tinacms-secret
                    key: GITHUB_REPO
            resources:
              requests:
                cpu: 5m
              limits:
                memory: 64Mi

    service:
      app:
        controller: tinacms
        ports:
          http:
            port: &port 4001

    ingress:
      app:
        enabled: true
        className: tailscale
        defaultBackend:
          service:
            name: *app
            port:
              number: *port
        tls:
          - hosts:
            - *app

    persistence:
      content:
        type: emptyDir
        advancedMounts:
          tinacms:
            git-clone:
              - path: /data/content
            app:
              - path: /app/content
            git-sync:
              - path: /data/content
      git-repo:
        type: emptyDir
        advancedMounts:
          tinacms:
            git-clone:
              - path: /data/git-repo
            git-sync:
              - path: /data/git-repo
