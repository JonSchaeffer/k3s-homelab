---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app tinacms
  namespace: homelab
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: default
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    controllers:
      tinacms:
        initContainers:
          git-clone:
            image:
              repository: alpine/git
              tag: latest
            command:
              - sh
              - -c
              - |
                if [ ! -d /data/repo/.git ]; then
                  git clone https://${GITHUB_TOKEN}@github.com/${GITHUB_OWNER}/${GITHUB_REPO}.git /data/repo
                else
                  cd /data/repo && git pull origin main
                fi
            env:
              GITHUB_TOKEN:
                valueFrom:
                  secretKeyRef:
                    name: tinacms-secret
                    key: GITHUB_PERSONAL_ACCESS_TOKEN
              GITHUB_OWNER:
                valueFrom:
                  secretKeyRef:
                    name: tinacms-secret
                    key: GITHUB_OWNER
              GITHUB_REPO:
                valueFrom:
                  secretKeyRef:
                    name: tinacms-secret
                    key: GITHUB_REPO
          setup:
            image:
              repository: ghcr.io/jonschaeffer/tinacms-backend
              tag: latest
            command:
              - sh
              - -c
              - |
                ln -sf /app/node_modules /data/repo/node_modules
        containers:
          app:
            image:
              repository: ghcr.io/jonschaeffer/tinacms-backend
              tag: latest
            workingDir: /data/repo
            ports:
              - containerPort: 4001
            resources:
              requests:
                cpu: 10m
              limits:
                memory: 2Gi
          git-sync:
            image:
              repository: alpine/git
              tag: latest
            command:
              - sh
              - -c
              - |
                cd /data/repo
                git config user.email "tinacms@jonschaeffer.dev"
                git config user.name "TinaCMS"
                while true; do
                  sleep 60
                  if git diff --quiet content/ && git diff --cached --quiet content/; then
                    continue
                  fi
                  git add content/
                  git commit -m "Content update via TinaCMS"
                  git push https://${GITHUB_TOKEN}@github.com/${GITHUB_OWNER}/${GITHUB_REPO}.git main
                done
            env:
              GITHUB_TOKEN:
                valueFrom:
                  secretKeyRef:
                    name: tinacms-secret
                    key: GITHUB_PERSONAL_ACCESS_TOKEN
              GITHUB_OWNER:
                valueFrom:
                  secretKeyRef:
                    name: tinacms-secret
                    key: GITHUB_OWNER
              GITHUB_REPO:
                valueFrom:
                  secretKeyRef:
                    name: tinacms-secret
                    key: GITHUB_REPO
            resources:
              requests:
                cpu: 5m
              limits:
                memory: 64Mi

    service:
      app:
        controller: tinacms
        ports:
          http:
            port: &port 4001

    ingress:
      app:
        enabled: true
        className: tailscale
        defaultBackend:
          service:
            name: *app
            port:
              number: *port
        tls:
          - hosts:
            - *app

    persistence:
      repo:
        type: emptyDir
        advancedMounts:
          tinacms:
            git-clone:
              - path: /data/repo
            setup:
              - path: /data/repo
            app:
              - path: /data/repo
            git-sync:
              - path: /data/repo
