apiVersion: v1
kind: ConfigMap
metadata:
  name: openclaw-configmap
  namespace: homelab
data:
  openclaw.json: |
    {
      "gateway": {
        "mode": "local",
        "bind": "lan",
        "port": 18789,
        "auth": {
          "mode": "token"
        },
        "controlUi": {
          "enabled": true
        }
      },
      "agents": {
        "defaults": {
          "workspace": "~/.openclaw/workspace",
          "model": {
            "primary": "opencode-go/kimi-k2.6"
          }
        },
        "list": [
          {
            "id": "default",
            "name": "OpenClaw Assistant",
            "workspace": "~/.openclaw/workspace"
          }
        ]
      },
      "cron": { "enabled": false },
      "plugins": {
        "entries": {
          "discord": {
            "enabled": true
          }
        }
      },
      "channels": {
        "discord": {
          "enabled": true,
          "token": {
            "source": "env",
            "provider": "default",
            "id": "DISCORD_BOT_TOKEN"
          },
          "groupPolicy": "allowlist",
          "allowFrom": ["134033064593588224"],
          "dmPolicy": "allowlist",
          "status": "online",
          "activity": "your DMs",
          "activityType": 2,
          "guilds": {
            "134033291471749120": {
              "slug": "vyrtl",
              "users": ["134033064593588224"],
              "channels": {
                "1513892143457112164": {
                  "enabled": true
                }
              }
            }
          }
        }
      }
    }
