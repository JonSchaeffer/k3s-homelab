---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app openclaw
  namespace: homelab
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: default
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    controllers:
      openclaw:
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          init-config:
            image:
              repository: busybox
              tag: latest
            command:
              - /bin/sh
              - -c
              - "cp /config/openclaw.json /home/node/.openclaw/openclaw.json && mkdir -p /home/node/.openclaw/workspace"
            securityContext:
              runAsUser: 1000
              runAsNonRoot: true
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 50m
                memory: 32Mi
        containers:
          app:
            image:
              repository: ghcr.io/openclaw/openclaw
              tag: slim
            env:
              TZ: America/New_York
              HOME: /home/node
              OPENCLAW_CONFIG_DIR: /home/node/.openclaw
              NODE_ENV: production
              OPENCODE_API_KEY:
                valueFrom:
                  secretKeyRef:
                    name: openclaw-secret
                    key: OPENCODE_API_KEY
              DISCORD_BOT_TOKEN:
                valueFrom:
                  secretKeyRef:
                    name: openclaw-secret
                    key: DISCORD_BOT_TOKEN
              OPENCLAW_GATEWAY_TOKEN:
                valueFrom:
                  secretKeyRef:
                    name: openclaw-secret
                    key: OPENCLAW_GATEWAY_TOKEN
              GITHUB_TOKEN:
                valueFrom:
                  secretKeyRef:
                    name: openclaw-secret
                    key: GITHUB_TOKEN
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /healthz
                    port: 18789
                  initialDelaySeconds: 60
                  periodSeconds: 30
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /readyz
                    port: 18789
                  initialDelaySeconds: 15
                  periodSeconds: 10
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 10m
              limits:
                memory: 1Gi
        pod:
          serviceAccountName: openclaw
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            runAsNonRoot: true
            fsGroup: 1000
            fsGroupChangePolicy: OnRootMismatch

    service:
      app:
        controller: openclaw
        ports:
          http:
            port: &port 18789

    ingress:
      app:
        enabled: true
        className: tailscale
        defaultBackend:
          service:
            name: *app
            port:
              number: *port
        tls:
          - hosts:
            - *app

    persistence:
      openclaw-home:
        existingClaim: openclaw-home
        advancedMounts:
          openclaw:
            init-config:
              - path: /home/node/.openclaw
            app:
              - path: /home/node/.openclaw
      openclaw-config:
        type: configMap
        name: openclaw-configmap
        advancedMounts:
          openclaw:
            init-config:
              - path: /config
                readOnly: true
      tmp:
        type: emptyDir
        advancedMounts:
          openclaw:
            app:
              - path: /tmp
