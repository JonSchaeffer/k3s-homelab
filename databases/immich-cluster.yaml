---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: immich-pg
  namespace: database
spec:
  instances: 1
  imageName: ghcr.io/tensorchord/cloudnative-vectorchord:17

  storage:
    size: 5Gi
    storageClass: longhorn

  postgresql:
    shared_preload_libraries:
      - "vchord.so"

  bootstrap:
    initdb:
      postInitSQL:
        - CREATE EXTENSION IF NOT EXISTS vchord CASCADE;

  managed:
    roles:
      - name: immich
        ensure: present
        comment: "Immich application user"
        login: true
        superuser: false
        passwordSecret:
          name: immich-db-credentials
