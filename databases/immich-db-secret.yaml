---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: immich-db-credentials
  namespace: database
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: immich-db-credentials
    creationPolicy: Owner
    template:
      data:
        username: immich
        password: "{{ .POSTGRES_PASSWORD }}"
  dataFrom:
    - extract:
        key: immich
